<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-panel">
            <div class="brand">
                <span class="brand-mark">SR</span>
                <div>
                    <h1>Student Registration</h1>
                    <p>Create your account</p>
                </div>
            </div>

            <form id="registerForm" class="auth-form" novalidate>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" placeholder="student@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>

                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Re-enter password" required>

                <button id="registerButton" type="submit">Register</button>
                <button id="googleRegisterButton" class="google-button" type="button">Continue with Google</button>
                <p id="message" class="message" role="status" aria-live="polite"></p>
            </form>

            <p class="switch-page">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="register.js"></script>
</body>
</html>
