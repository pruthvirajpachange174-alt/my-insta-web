<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-panel">
            <div class="brand">
                <span class="brand-mark">SR</span>
                <div>
                    <h1>Student Login</h1>
                    <p>Access your dashboard</p>
                </div>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" placeholder="student@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>

                <button id="loginButton" type="submit">Login</button>
                <button id="googleLoginButton" class="google-button" type="button">Continue with Google</button>
                <p id="message" class="message" role="status" aria-live="polite"></p>
            </form>

            <p class="switch-page">
                Need an account?
                <a href="register.html">Register</a>
            </p>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
